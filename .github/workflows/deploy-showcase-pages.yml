name: Deploy Showcase To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute base href
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [[ "$REPO" == "$OWNER.github.io" ]]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO/"
          fi

          echo "BASE_HREF=$BASE_HREF" >> "$GITHUB_ENV"

      - name: Build showcase
        run: pnpm ng build showcase --configuration production --base-href "$BASE_HREF"

      - name: Add SPA fallback and Pages markers
        shell: bash
        run: |
          cp dist/showcase/browser/index.html dist/showcase/browser/404.html
          touch dist/showcase/browser/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/showcase/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
